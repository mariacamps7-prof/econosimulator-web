<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Generación Decisiva</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 40px;
    }

    .panel {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      margin: 10px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn-1 {
      background: #2563eb;
    }

    .btn-2 {
      background: #16a34a;
    }

  </style>
</head>

<body>

  <h1>GENERACIÓN DECISIVA</h1>
  <div class="subtitle">Sala del Gabinete</div>

  <div class="panel">

    <p>
      Dos consejeros técnicos. Una decisión. Contrasten antes de responder.
    </p>

    <p>
      Identifíquense antes de comenzar.
    </p>

    <!-- 🔥 BOTONES (ANTES ERAN LOS CHATS EMBEBIDOS) -->

    <a class="btn btn-1"
       href="https://cloud.flowiseai.com"
       target="_blank">
      💬 Abrir chat asesor macroeconómico
    </a>

    <a class="btn btn-2"
       href="https://cloud.flowiseai.com"
       target="_blank">
      💬 Abrir chat sector empresarial
    </a>

    <p style="margin-top:30px; font-size:12px; color:#94a3b8;">
      Regla: consulten a ambos consejeros antes de decidir.
    </p>

  </div>

</body>
</html>
