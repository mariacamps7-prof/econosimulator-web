<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generación Decisiva — Sala del Gabinete</title>

<style>
  /* ============= RESET Y TIPOGRAFÍA ============= */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #0F1B2D;
    --bg-mid: #1A2942;
    --bg-card: #213354;
    --accent-gold: #D4A574;
    --accent-blue: #6FA8DC;
    --accent-green: #88C9A1;
    --accent-coral: #E8927C;
    --text-primary: #F5F5F0;
    --text-secondary: #B8C5D6;
    --text-muted: #7A8AA0;
    --border-subtle: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(ellipse at top, var(--bg-mid) 0%, var(--bg-deep) 60%);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
    padding: 32px 20px 60px;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  .header {
    text-align: center;
    padding: 28px 0 40px;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 48px;
  }

  .crest {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: Georgia, serif;
    font-size: 38px;
    font-weight: 400;
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    font-style: italic;
  }

  .agents-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 48px;
  }

  .agent-card {
    background: var(--bg-card);
    border-radius: 8px;
    padding: 28px;
    text-decoration: none;
    color: inherit;
    border: 1px solid var(--border-subtle);
  }

  .agent-emblem {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    margin-bottom: 18px;
  }

  .ministerio .agent-emblem { background: rgba(111,168,220,0.15); color: var(--accent-blue); }
  .sector .agent-emblem { background: rgba(232,146,124,0.15); color: var(--accent-coral); }

  .agent-name {
    font-family: Georgia, serif;
    font-size: 22px;
    margin-bottom: 10px;
  }

  .agent-description {
    font-size: 13px;
    color: var(--text-secondary);
  }
</style>
</head>

<body>
<div class="container">

  <!-- CABECERA -->
  <div class="header">
    <div class="crest">GENERACIÓN DECISIVA · ECONOMY LAB</div>
    <h1>Sala del Gabinete</h1>
    <p class="subtitle">Acceso a consejeros técnicos del Foro.</p>
  </div>

  <!-- GRID DE AGENTES -->
  <div class="agents-grid">

    <a href="#" class="agent-card ministerio" id="link-ministerio" data-agent="ministerio">
      <div class="agent-emblem">M</div>
      <div class="agent-name">Asesor del Ministerio</div>
      <div class="agent-description">Análisis de política económica.</div>
    </a>

    <a href="#" class="agent-card sector" id="link-sector" data-agent="sector">
      <div class="agent-emblem">S</div>
      <div class="agent-name">Representante del Sector</div>
      <div class="agent-description">Impacto empresarial y social.</div>
    </a>

  </div>

</div>

<!-- ================= FLOWISE CHAT ================= -->
<script type="module">
  import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js";

  Chatbot.initFull({
    chatflowid: "e7e98910-13ae-4b09-8aa1-380755d72185",
    apiHost: "https://cloud.flowiseai.com",
  });
</script>

</body>
</html>
